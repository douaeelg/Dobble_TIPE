<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dobble 3D Simulation</title>
    <meta
      name="description"
      content="Open-source Dobble simulation based on finite projective planes, built as a single static page for GitHub Pages."
    />
    <style>
      :root {
        --bg: #050505;
        --panel: rgba(255, 255, 255, 0.06);
        --panel-strong: rgba(0, 0, 0, 0.62);
        --border: rgba(255, 255, 255, 0.12);
        --muted: rgba(255, 255, 255, 0.56);
        --soft: rgba(255, 255, 255, 0.2);
        --accent: #ff7a00;
        --accent-soft: rgba(255, 122, 0, 0.14);
        --accent-glow: rgba(255, 122, 0, 0.36);
        --paper: #f4f1ea;
        --ink: #111111;
        --danger: #7a1e1e;
        --shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(255, 122, 0, 0.22), transparent 28%),
          radial-gradient(circle at top right, rgba(255, 255, 255, 0.07), transparent 22%),
          linear-gradient(180deg, #0b0b0d 0%, #040404 100%);
        color: #ffffff;
        font-family: "Arial Black", "Segoe UI", sans-serif;
        user-select: none;
        -webkit-user-select: none;
      }

      body {
        overflow-x: hidden;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
        border: 0;
      }

      .app {
        min-height: 100vh;
      }

      .header {
        position: fixed;
        inset: 0 0 auto 0;
        z-index: 50;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        padding: 1.25rem 1.5rem;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.82), rgba(0, 0, 0, 0));
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.9rem;
      }

      .brand-badge {
        width: 2.8rem;
        height: 2.8rem;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background: var(--accent);
        box-shadow: 0 0 40px var(--accent-glow);
        color: white;
        font-size: 1.1rem;
      }

      .brand-title {
        margin: 0;
        font-size: clamp(1.15rem, 2vw, 1.7rem);
        text-transform: uppercase;
        font-style: italic;
        letter-spacing: -0.05em;
      }

      .header-actions {
        display: flex;
        gap: 0.7rem;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .ghost-btn,
      .solid-btn,
      .chip-btn {
        border-radius: 999px;
        padding: 0.8rem 1.1rem;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 0.72rem;
        font-weight: 900;
        transition:
          transform 180ms ease,
          background 180ms ease,
          color 180ms ease,
          border-color 180ms ease;
      }

      .ghost-btn,
      .chip-btn {
        color: white;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.18);
      }

      .ghost-btn:hover,
      .chip-btn:hover {
        background: rgba(255, 255, 255, 0.12);
        transform: translateY(-1px);
      }

      .solid-btn {
        background: var(--accent);
        color: var(--ink);
        box-shadow: 0 18px 50px rgba(255, 122, 0, 0.25);
      }

      .solid-btn:hover {
        background: white;
        transform: translateY(-1px);
      }

      .screen {
        min-height: 100vh;
      }

      .lobby {
        display: grid;
        grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
        gap: 2rem;
        align-items: center;
        padding: 7.5rem 1.5rem 2rem;
        max-width: 1180px;
        margin: 0 auto;
      }

      .hero-title {
        margin: 0;
        font-size: clamp(3rem, 8vw, 5.8rem);
        line-height: 0.92;
        text-transform: uppercase;
        font-style: italic;
        letter-spacing: -0.07em;
      }

      .eyebrow {
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.34em;
        font-size: 0.68rem;
        margin: 0 0 1rem;
      }

      .hero-actions {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
        margin-top: 2rem;
      }

      .hero-actions .solid-btn,
      .hero-actions .ghost-btn {
        min-width: min(100%, 24rem);
        padding: 1.15rem 1.5rem;
        font-size: 0.9rem;
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: 2rem;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }

      .stats-panel {
        padding: 1.5rem;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
      }

      .stat-card {
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 1.35rem;
        padding: 1.2rem;
        background: rgba(0, 0, 0, 0.24);
      }

      .stat-label {
        margin: 0;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.28em;
        font-size: 0.64rem;
      }

      .stat-value {
        margin: 0.65rem 0 0;
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 1;
      }

      .accent-value {
        color: var(--accent);
      }

      .body-copy {
        color: rgba(255, 255, 255, 0.72);
        font-family: "Segoe UI", sans-serif;
        line-height: 1.8;
        margin: 1.4rem 0 0;
      }

      .note {
        margin-top: 1.3rem;
        padding: 1rem 1.1rem;
        border-radius: 1.2rem;
        border: 1px solid rgba(255, 122, 0, 0.28);
        background: rgba(255, 122, 0, 0.12);
        color: #ffd9bd;
        font-family: "Segoe UI", sans-serif;
        line-height: 1.6;
      }

      .theory {
        max-width: 940px;
        margin: 0 auto;
        padding: 7.5rem 1.5rem 3rem;
      }

      .theory h2 {
        margin: 0;
        font-size: clamp(3rem, 7vw, 5.6rem);
        line-height: 0.94;
        text-transform: uppercase;
        font-style: italic;
        letter-spacing: -0.07em;
      }

      .theory .intro {
        margin: 1rem 0 0;
        color: var(--accent);
        text-transform: uppercase;
        font-size: clamp(1rem, 2.6vw, 1.45rem);
        font-style: italic;
      }

      .theory-card {
        margin-top: 2rem;
        padding: 2rem;
      }

      .theory-card p {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        line-height: 1.95;
        color: rgba(255, 255, 255, 0.8);
        font-size: 1.05rem;
      }

      .game {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        padding: 6.8rem 1rem 1rem;
      }

      .game-stage {
        position: relative;
        min-height: calc(100vh - 7.8rem);
        border-radius: 2rem;
        background:
          radial-gradient(circle at top center, rgba(255, 255, 255, 0.06), transparent 22%),
          linear-gradient(180deg, rgba(18, 20, 34, 0.9), rgba(5, 5, 7, 1));
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .stage-grid {
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr) 240px;
        gap: 1rem;
        min-height: calc(100vh - 7.8rem);
        padding: 1.25rem;
      }

      .hud-panel {
        align-self: center;
        padding: 1.2rem;
        background: var(--panel-strong);
        border: 1px solid var(--border);
        border-radius: 1.8rem;
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      .hud-panel h3 {
        margin: 0 0 1rem;
        font-size: 0.72rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.28em;
      }

      .hud-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 0.9rem;
        gap: 0.8rem;
      }

      .hud-name {
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 0.76rem;
      }

      .hud-value {
        font-size: 1.35rem;
      }

      .stage-main {
        position: relative;
        display: grid;
        align-items: center;
        justify-items: center;
        gap: 2rem;
        padding: 2rem 1rem 6rem;
        z-index: 3;
      }

      .cards-stack {
        width: min(100%, 760px);
        display: grid;
        gap: 2.25rem;
        justify-items: center;
        position: relative;
        z-index: 4;
      }

      .card-shell {
        position: relative;
        width: min(82vw, 330px);
        aspect-ratio: 1 / 1;
        display: grid;
        place-items: center;
        transition: transform 220ms ease, filter 220ms ease, opacity 220ms ease;
        z-index: 5;
      }

      .card-shell.top {
        --card-tilt: -7deg;
        transform: rotate(-7deg);
      }

      .card-shell.bottom {
        --card-tilt: 6deg;
        transform: rotate(6deg);
      }

      .card-shell.match-flash {
        animation: flash-card 800ms ease;
      }

      @keyframes flash-card {
        0% { filter: drop-shadow(0 0 0 rgba(255, 122, 0, 0)); }
        30% { filter: drop-shadow(0 0 28px rgba(255, 122, 0, 0.65)); }
        100% { filter: drop-shadow(0 0 0 rgba(255, 122, 0, 0)); }
      }

      .card {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background:
          radial-gradient(circle at 30% 28%, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.72)),
          linear-gradient(180deg, #ffffff, #ece6da);
        border: 10px solid rgba(255, 255, 255, 0.26);
        box-shadow:
          inset 0 -16px 40px rgba(0, 0, 0, 0.1),
          0 24px 65px rgba(0, 0, 0, 0.35);
        overflow: hidden;
      }

      .card::after {
        content: "";
        position: absolute;
        inset: 12px;
        border-radius: 50%;
        border: 1px dashed rgba(0, 0, 0, 0.06);
      }

      .symbol {
        position: absolute;
        width: 3.7rem;
        height: 3.7rem;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: transparent;
        color: var(--ink);
        font-size: clamp(1.7rem, 3.5vw, 2.2rem);
        transform: translate(-50%, -50%) rotate(var(--rotation));
        transition:
          transform 180ms ease,
          background 180ms ease,
          box-shadow 180ms ease;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      .symbol.hit {
        background: rgba(255, 122, 0, 0.16);
        box-shadow: 0 0 0 12px rgba(255, 122, 0, 0.12);
        transform: translate(-50%, -50%) rotate(var(--rotation)) scale(calc(var(--symbol-scale) * 1.18));
      }

      .symbol.locked {
        background: rgba(255, 255, 255, 0.58);
        box-shadow:
          0 0 0 10px rgba(255, 122, 0, 0.18),
          0 0 34px rgba(255, 122, 0, 0.4);
        animation: bot-lock 420ms ease-in-out infinite alternate;
      }

      @keyframes bot-lock {
        0% {
          transform: translate(-50%, -50%) rotate(var(--rotation)) scale(var(--symbol-scale));
        }
        100% {
          transform: translate(-50%, -50%) rotate(var(--rotation)) scale(calc(var(--symbol-scale) * 1.22));
        }
      }

      .card-shell.shuffling .symbol {
        animation: symbol-shuffle 620ms cubic-bezier(0.22, 1, 0.36, 1) both;
        animation-delay: calc(var(--symbol-index) * 30ms);
      }

      .card-shell.dealing .symbol {
        animation: symbol-deal-in 520ms cubic-bezier(0.16, 1, 0.3, 1) both;
        animation-delay: calc(var(--symbol-index) * 35ms);
      }

      @keyframes symbol-shuffle {
        0% {
          opacity: 1;
          filter: blur(0);
          transform: translate(-50%, -50%) rotate(var(--rotation)) scale(var(--symbol-scale));
        }
        35% {
          opacity: 1;
          filter: blur(1px);
          transform: translate(-50%, -50%) rotate(calc(var(--rotation) + 36deg)) scale(calc(var(--symbol-scale) * 0.92));
        }
        70% {
          opacity: 1;
          filter: blur(2px);
          transform: translate(-50%, -50%) rotate(calc(var(--rotation) + 84deg)) scale(calc(var(--symbol-scale) * 1.08));
        }
        100% {
          opacity: 1;
          filter: blur(0);
          transform: translate(-50%, -50%) rotate(calc(var(--rotation) + 120deg)) scale(var(--symbol-scale));
        }
      }

      @keyframes symbol-deal-in {
        0% {
          opacity: 1;
          filter: blur(2px);
          transform: translate(-50%, -50%) rotate(calc(var(--rotation) - 90deg)) scale(calc(var(--symbol-scale) * 0.88));
        }
        60% {
          opacity: 1;
          filter: blur(0);
          transform: translate(-50%, -50%) rotate(calc(var(--rotation) + 12deg)) scale(calc(var(--symbol-scale) * 1.08));
        }
        100% {
          opacity: 1;
          filter: blur(0);
          transform: translate(-50%, -50%) rotate(var(--rotation)) scale(var(--symbol-scale));
        }
      }

      .instruction {
        position: absolute;
        left: 50%;
        bottom: 1.4rem;
        transform: translateX(-50%);
        padding: 0.95rem 1.2rem;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(10px);
        text-transform: uppercase;
        letter-spacing: 0.28em;
        font-size: 0.68rem;
        text-align: center;
        color: rgba(255, 255, 255, 0.82);
        animation: pulse 2.1s ease infinite;
        z-index: 2;
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.72; }
        50% { opacity: 1; }
      }

      .debug {
        position: absolute;
        top: 1rem;
        left: 1rem;
        padding: 0.55rem 0.75rem;
        border-radius: 0.7rem;
        background: rgba(0, 0, 0, 0.5);
        color: rgba(255, 255, 255, 0.45);
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 0.7rem;
      }

      .remaining-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.55rem;
        padding: 1rem 1.2rem;
        border-radius: 999px;
        background: var(--accent);
        color: var(--ink);
        text-transform: uppercase;
        font-style: italic;
        font-size: 1rem;
        letter-spacing: -0.02em;
        box-shadow: 0 18px 50px rgba(255, 122, 0, 0.24);
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.54);
        backdrop-filter: blur(8px);
        z-index: 7;
      }

      .overlay.visible {
        display: flex;
      }

      .overlay-card {
        width: min(92vw, 430px);
        padding: 2rem;
        text-align: center;
      }

      .overlay-card h3 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 3rem);
        text-transform: uppercase;
        font-style: italic;
        letter-spacing: -0.06em;
      }

      .overlay-card p {
        margin: 1rem 0 0;
        color: var(--muted);
        font-family: "Segoe UI", sans-serif;
      }

      .footer-note {
        margin-top: 1.1rem;
        color: rgba(255, 255, 255, 0.42);
        font-family: "Segoe UI", sans-serif;
        font-size: 0.88rem;
      }

      .flash-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        background:
          radial-gradient(circle at center, rgba(255, 70, 70, 0.34), transparent 42%),
          rgba(160, 20, 20, 0.36);
        z-index: 6;
      }

      .flash-layer.visible {
        animation: red-flash 320ms ease;
      }

      @keyframes red-flash {
        0% { opacity: 0; }
        25% { opacity: 1; }
        100% { opacity: 0; }
      }

      .wrong-flash {
        animation: wrong-bg 280ms ease;
      }

      @keyframes wrong-bg {
        0% { box-shadow: inset 0 0 0 0 rgba(122, 30, 30, 0); }
        50% { box-shadow: inset 0 0 240px 120px rgba(122, 30, 30, 0.72); }
        100% { box-shadow: inset 0 0 0 0 rgba(122, 30, 30, 0); }
      }

      @media (max-width: 980px) {
        .lobby {
          grid-template-columns: 1fr;
          padding-top: 6.8rem;
        }

        .stage-grid {
          grid-template-columns: 1fr;
          grid-template-rows: auto auto auto;
        }

        .hud-panel {
          align-self: stretch;
        }

        .stage-main {
          order: 2;
          min-height: 0;
          padding-bottom: 7rem;
        }

        .cards-stack {
          gap: 1.35rem;
        }

        .card-shell {
          width: min(88vw, 320px);
        }

        .instruction {
          width: calc(100% - 2rem);
          white-space: normal;
          line-height: 1.7;
        }
      }

      @media (max-width: 560px) {
        .header {
          align-items: flex-start;
          flex-direction: column;
        }

        .header-actions {
          width: 100%;
        }

        .header-actions button {
          flex: 1 1 auto;
        }

        .stats-grid {
          grid-template-columns: 1fr;
        }

        .game {
          padding-top: 7.8rem;
        }

        .debug {
          display: none;
        }

        .symbol {
          width: 3.2rem;
          height: 3.2rem;
          font-size: 1.7rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="app" id="app"></div>

    <script>
      const resources = {
        en: {
          title: "DOBBLE 3D",
          start: "Start Simulation",
          restart: "Restart",
          game_over: "Game Over!",
          theory_title: "Finite Projective Planes",
          theory_intro: "Dobble is based on Finite Projective Planes PG(2,q).",
          theory_desc:
            "In a projective plane of order q, there are q²+q+1 points and q²+q+1 lines. Every line contains q+1 points, and every pair of lines intersects at exactly one point. In Dobble (q=7), each card is a line and each symbol is a point. The standard game uses 55 out of the 57 possible cards.",
          back_to_game: "Back",
          read_theory: "Read Theory",
          remaining_cards: "Remaining cards",
          simulation_title: "Local Simulation",
          simulation_subtitle: "No backend. No API. Just the Dobble math and a clean static card simulation.",
          simulation_desc:
            "Watch a shuffled finite-projective-plane deck locally. The bot finds the shared symbol on both visible cards and triggers the next shuffle.",
          simulation_complete:
            "Simulation complete. Every remaining transition has been resolved locally in the browser.",
          simulation_hint: "Press to shuffle the symbols, then the bot reveals the new match.",
          github_note: "Single-file version for a GitHub Pages project page.",
          bot_shuffle: "Shuffle Cards"
        },
        fr: {
          title: "DOBBLE 3D",
          start: "Lancer la simulation",
          restart: "Recommencer",
          game_over: "Partie terminee !",
          theory_title: "Plans projectifs finis",
          theory_intro: "Dobble est base sur les Plans Projectifs Finis PG(2,q).",
          theory_desc:
            "Dans un plan projectif d'ordre q, il y a q²+q+1 points et q²+q+1 droites. Chaque droite contient q+1 points, et chaque paire de droites s'intersecte en exactement un point. Dans Dobble (q=7), chaque carte est une droite et chaque symbole est un point. Le jeu standard utilise 55 des 57 cartes possibles.",
          back_to_game: "Retour",
          read_theory: "Lire la theorie",
          remaining_cards: "Cartes restantes",
          simulation_title: "Simulation locale",
          simulation_subtitle: "Sans backend. Sans API. Seulement les maths de Dobble et une simulation statique simple.",
          simulation_desc:
            "Parcourez localement un paquet melange issu du plan projectif fini. Le bot trouve le symbole commun sur les deux cartes visibles puis declenche le prochain melange.",
          simulation_complete:
            "Simulation terminee. Toutes les transitions restantes ont ete gerees localement dans le navigateur.",
          simulation_hint: "Appuyez pour melanger les symboles, puis le bot revele le nouveau match.",
          github_note: "Version mono-fichier pour une page de projet GitHub Pages.",
          bot_shuffle: "Melanger les cartes"
        }
      };

      const emojis = [
        "❤️", "⭐", "🌙", "☀️", "☁️", "⚡", "🔥", "💧",
        "🌳", "🌸", "🐦", "🐟", "🐱", "🐶", "🍎", "🍌",
        "🚗", "✈️", "⛵", "🏠", "🔑", "🔒", "🔔", "📖",
        "✏️", "⏰", "📱", "🎵", "📷", "🎁", "🎈", "🎂",
        "🍕", "🍔", "🍦", "🍪", "⚽", "🏀", "🎾", "⛳",
        "💎", "👑", "⚔️", "🛡️", "⚓", "🧭", "🗺️", "🚩",
        "👻", "👽", "🤖", "🚀", "🛸", "🦖", "🐉", "🦄", "✨"
      ];

      const state = {
        lang: "fr",
        view: "lobby",
        score: 0,
        bestStreak: 0,
        currentStreak: 0,
        gameStarted: false,
        gameOver: false,
        remaining: 0,
        deck: [],
        centerCard: null,
        nextCard: null,
        sharedSymbolId: null,
        transitioning: false,
        dealing: false,
        flashSymbolId: null,
        botFocusSymbolId: null,
        wrongFlash: false,
        debug: "Idle"
      };

      const app = document.getElementById("app");

      function t(key) {
        return resources[state.lang][key];
      }

      function shuffle(array) {
        const copy = [...array];
        for (let i = copy.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      function randomSymbolPool(excluded, count) {
        const pool = [];
        for (let i = 0; i < emojis.length; i += 1) {
          if (!excluded.has(i)) {
            pool.push(i);
          }
        }
        return shuffle(pool).slice(0, count);
      }

      function generateDobbleDeck(order) {
        const cards = [];

        for (let m = 0; m < order; m += 1) {
          for (let b = 0; b < order; b += 1) {
            const card = [];
            for (let x = 0; x < order; x += 1) {
              const y = (m * x + b) % order;
              card.push(x * order + y);
            }
            card.push(order * order + m);
            cards.push(shuffle(card));
          }
        }

        for (let c = 0; c < order; c += 1) {
          const card = [];
          for (let y = 0; y < order; y += 1) {
            card.push(c * order + y);
          }
          card.push(order * order + order);
          cards.push(shuffle(card));
        }

        const infinityCard = [];
        for (let m = 0; m < order; m += 1) {
          infinityCard.push(order * order + m);
        }
        infinityCard.push(order * order + order);
        cards.push(shuffle(infinityCard));

        return shuffle(cards);
      }

      function findSharedSymbol(cardA, cardB) {
        if (!cardA || !cardB) {
          return null;
        }

        for (const symbolId of cardA) {
          if (cardB.includes(symbolId)) {
            return symbolId;
          }
        }

        return null;
      }

      function syncVisiblePairFromDeck() {
        state.centerCard = state.deck.shift() ?? null;
        state.nextCard = state.deck.shift() ?? null;
        state.sharedSymbolId = findSharedSymbol(state.centerCard, state.nextCard);
        state.remaining =
          (state.centerCard ? 1 : 0) +
          (state.nextCard ? 1 : 0) +
          state.deck.length;
      }

      function positionsForCard(count, seed) {
        const positions = [];
        for (let i = 0; i < count; i += 1) {
          if (i === 0) {
            positions.push({ x: 50, y: 50, rotation: 0, scale: 1.05 });
            continue;
          }
          const angle = ((i - 1) / (count - 1)) * Math.PI * 2 + seed;
          const radius = i % 2 === 0 ? 26 : 31;
          positions.push({
            x: 50 + Math.cos(angle) * radius,
            y: 50 + Math.sin(angle) * radius,
            rotation: ((i * 67 + seed * 180) % 80) - 40,
            scale: 0.92 + ((i * 13) % 5) * 0.08
          });
        }
        return positions;
      }

      function createCardMarkup(card, type) {
        if (!card) {
          return '<div class="card-shell"><div class="card"></div></div>';
        }

        const positions = positionsForCard(card.length, type === "top" ? 0.35 : -0.18);
        const shellClass = `card-shell ${type}${state.flashSymbolId !== null ? " match-flash" : ""}${state.transitioning ? " shuffling" : ""}${state.dealing ? " dealing" : ""}${state.wrongFlash ? " wrong-flash" : ""}`;

        const symbols = card.map((symbolId, index) => {
          const pos = positions[index];
          const emoji = emojis[symbolId] || "✨";
          const hit = state.flashSymbolId === symbolId ? "hit" : "";
          const locked = state.botFocusSymbolId === symbolId ? "locked" : "";
          return `
            <div
              class="symbol ${hit} ${locked}"
              style="left:${pos.x}%; top:${pos.y}%; --rotation:${pos.rotation}deg; --symbol-scale:${pos.scale}; --symbol-index:${index}; transform: translate(-50%, -50%) rotate(${pos.rotation}deg) scale(${pos.scale});"
              data-symbol-id="${symbolId}"
              data-card-type="${type}"
              aria-label="${emoji}"
              role="img"
            >${emoji}</div>
          `;
        }).join("");

        return `<div class="${shellClass}"><div class="card">${symbols}</div></div>`;
      }

      function revealCurrentMatch() {
        if (state.sharedSymbolId === null || state.gameOver) {
          return;
        }

        state.botFocusSymbolId = state.sharedSymbolId;
        state.flashSymbolId = state.sharedSymbolId;
        state.debug = `Bot found symbol ${state.sharedSymbolId}`;
        render();

        window.setTimeout(() => {
          if (state.botFocusSymbolId === state.sharedSymbolId) {
            state.flashSymbolId = null;
            render();
          }
        }, 700);
      }

      function startSimulation() {
        state.score = 0;
        state.bestStreak = 0;
        state.currentStreak = 0;
        state.gameStarted = true;
        state.gameOver = false;
        state.deck = generateDobbleDeck(7);
        state.transitioning = false;
        state.dealing = true;
        state.flashSymbolId = null;
        state.botFocusSymbolId = null;
        state.wrongFlash = false;
        state.centerCard = null;
        state.nextCard = null;
        state.sharedSymbolId = null;
        state.view = "game";
        state.debug = "Simulation running";
        syncVisiblePairFromDeck();
        render();
        window.setTimeout(() => {
          state.dealing = false;
          render();
          revealCurrentMatch();
        }, 560);
      }

      function commitShuffle() {
        state.flashSymbolId = null;
        state.botFocusSymbolId = null;
        state.transitioning = true;
        state.score += 1;
        state.currentStreak += 1;
        state.bestStreak = Math.max(state.bestStreak, state.currentStreak);
        state.debug = "Shuffling symbols";
        render();

        window.setTimeout(() => {
          syncVisiblePairFromDeck();
          state.flashSymbolId = null;
          state.botFocusSymbolId = null;
          state.transitioning = false;
          state.dealing = true;
          state.wrongFlash = false;

          if (!state.centerCard || !state.nextCard || state.sharedSymbolId === null) {
            state.gameStarted = false;
            state.gameOver = true;
            state.debug = "Simulation complete";
            state.dealing = false;
          }

          render();
          if (!state.gameOver) {
            window.setTimeout(() => {
              state.dealing = false;
              render();
              revealCurrentMatch();
            }, 560);
          }
        }, 620);
      }

      function handleWrongMatch() {
        state.currentStreak = 0;
        state.botFocusSymbolId = null;
        state.wrongFlash = true;
        state.debug = "Wrong symbol";
        render();
        window.setTimeout(() => {
          state.wrongFlash = false;
          render();
        }, 280);
      }

      function runBotTurn() {
        if (
          state.transitioning ||
          state.gameOver ||
          !state.centerCard ||
          !state.nextCard ||
          state.sharedSymbolId === null
        ) {
          return;
        }

        commitShuffle();
      }

      function renderHeader() {
        return `
          <header class="header">
            <div class="brand">
              <div class="brand-badge">▶</div>
              <h1 class="brand-title">${t("title")}</h1>
            </div>
            <div class="header-actions">
              <button class="chip-btn" data-action="toggle-lang">${state.lang === "fr" ? "EN" : "FR"}</button>
              <button class="ghost-btn" data-action="show-theory">${t("theory_title")}</button>
            </div>
          </header>
        `;
      }

      function renderLobby() {
        return `
          <main class="screen lobby">
            <section>
              <p class="eyebrow">${t("simulation_subtitle")}</p>
              <h2 class="hero-title">${t("simulation_title")}</h2>
              <div class="hero-actions">
                <button class="solid-btn" data-action="start">${state.gameOver ? t("restart") : t("start")}</button>
                <button class="ghost-btn" data-action="show-theory">${t("read_theory")}</button>
              </div>
            </section>

            <aside class="panel stats-panel">
              <p class="body-copy">${t("simulation_desc")}</p>
              ${state.gameOver ? `<div class="note">${t("simulation_complete")}</div>` : ""}
              <p class="footer-note">${t("github_note")}</p>
            </aside>
          </main>
        `;
      }

      function renderTheory() {
        return `
          <main class="screen theory">
            <section>
              <h2>${t("theory_title")}</h2>
              <p class="intro">${t("theory_intro")}</p>
            </section>
            <section class="panel theory-card">
              <p>${t("theory_desc")}</p>
              <div class="hero-actions">
                <button class="solid-btn" data-action="back">${t("back_to_game")}</button>
              </div>
            </section>
          </main>
        `;
      }

      function renderGame() {
        return `
          <main class="screen game">
            <section class="game-stage ${state.wrongFlash ? "wrong-flash" : ""}">
              <div class="flash-layer ${state.wrongFlash ? "visible" : ""}"></div>
              <div class="debug">${state.debug} | ${state.centerCard ? "Y" : "N"}/${state.nextCard ? "Y" : "N"}</div>
              <div class="stage-grid">
                <aside class="hud-panel">
                  <h3>Simulation</h3>
                  <div class="hud-row">
                    <span class="hud-name">Match</span>
                    <strong class="hud-value">${state.sharedSymbolId !== null ? (emojis[state.sharedSymbolId] || "•") : "?"}</strong>
                  </div>
                </aside>

                <section class="stage-main">
                  <div class="cards-stack">
                    ${createCardMarkup(state.centerCard, "top")}
                    ${createCardMarkup(state.nextCard, "bottom")}
                  </div>
                </section>

                <aside class="hud-panel">
                  <div class="remaining-badge">${t("remaining_cards")}: ${state.remaining}</div>
                  <div class="hero-actions" style="margin-top: 1.2rem;">
                    <button class="solid-btn" data-action="bot-match">${t("bot_shuffle")}</button>
                    <button class="ghost-btn" data-action="restart">${t("restart")}</button>
                    <button class="ghost-btn" data-action="show-theory">${t("read_theory")}</button>
                  </div>
                </aside>
              </div>

              <div class="instruction">${t("simulation_hint")}</div>

              <div class="overlay ${state.gameOver ? "visible" : ""}">
                <div class="overlay-card panel">
                  <h3>${t("game_over")}</h3>
                  <div class="hero-actions" style="align-items:center;">
                    <button class="solid-btn" data-action="restart">${t("restart")}</button>
                  </div>
                </div>
              </div>
            </section>
          </main>
        `;
      }

      function render() {
        let content = "";
        if (state.view === "theory") {
          content = renderTheory();
        } else if (state.view === "game") {
          content = renderGame();
        } else {
          content = renderLobby();
        }

        app.innerHTML = `${renderHeader()}${content}`;

        app.querySelectorAll("[data-action]").forEach((button) => {
          button.addEventListener("click", () => {
            const action = button.getAttribute("data-action");
            if (action === "toggle-lang") {
              state.lang = state.lang === "fr" ? "en" : "fr";
              render();
            } else if (action === "show-theory") {
              state.view = "theory";
              render();
            } else if (action === "back") {
              state.view = state.gameStarted || state.gameOver ? "game" : "lobby";
              render();
            } else if (action === "bot-match") {
              runBotTurn();
            } else if (action === "start" || action === "restart") {
              startSimulation();
            }
          });
        });
      }

      render();
    </script>
  </body>
</html>
